<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<title>交易級通知系統</title>



</head>



<body>



<h1>📈 交易級監控</h1>



<p id="status"></p>



<script>



const API = "https://你的worker網址";



let last = {};



let triggered = new Set();



async function load() {



  const res = await fetch(API + "/trade?t=" + Date.now());



  const data = await res.json();



  document.getElementById("status").innerText = data.updateTime;



  data.list.forEach(s => {



    const prev = last[s.code];



    if (prev) {



      // 🔥 突破買點



      if (prev < s.buy && s.price >= s.buy) {



        alertOnce(s.code + "_buy",



          `🔥突破買點 ${s.name}(${s.code}) → ${s.price}`);



      }



      // ❌ 跌破停損



      if (prev > s.stop && s.price <= s.stop) {



        alertOnce(s.code + "_stop",



          `❌跌破停損 ${s.name}(${s.code}) → ${s.price}`);



      }



    }



    last[s.code] = s.price;



  });



}



// ===== 推播 =====



async function send(msg) {



  await fetch(API + "/push?msg=" + encodeURIComponent(msg));



}



// ===== 防重複 =====



function alertOnce(key, msg) {



  if (triggered.has(key)) return;



  triggered.add(key);



  send(msg);



}



// 每20秒（更即時）



setInterval(load, 20000);



load();



</script>



</body>



</html>
