<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器</title>



<style>



body {



    background: #000;



    color: white;



    font-family: Arial;



    margin: 0;



    padding: 20px;



}



.card {



    background: #111;



    border: 1px solid #FFD700;



    border-radius: 15px;



    padding: 20px;



    margin-bottom: 20px;



}



h1, h2 {



    color: #FFD700;



}



input {



    width: 100%;



    padding: 10px;



    margin: 8px 0;



    border-radius: 8px;



    border: none;



}



button {



    width: 100%;



    padding: 12px;



    background: #FFD700;



    border: none;



    font-weight: bold;



    border-radius: 10px;



}



.result {



    margin-top: 15px;



    font-size: 18px;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器</h1>



    <p>AI 幫你選股，紀律幫你賺錢</p>



</div>



<div class="card">



    <h2>股票監控（可自由更改）</h2>



    <input id="stockCode" placeholder="股票代號，例如 3706">



    <input id="buyPrice" placeholder="買入成本價，例如 75.66">



    <input id="quantity" placeholder="持有張數，例如 2">



    <button onclick="analyzeStock()">立即分析</button>



    <div class="result" id="resultArea"></div>



</div>



<script>



async function analyzeStock() {



    const stockCode = document.getElementById("stockCode").value;



    const buyPrice = parseFloat(document.getElementById("buyPrice").value);



    const quantity = parseFloat(document.getElementById("quantity").value);



    const resultArea = document.getElementById("resultArea");



    if (!stockCode || !buyPrice || !quantity) {



        resultArea.innerHTML = "請完整輸入資料";



        return;



    }



    try {



        const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${stockCode}.tw`;



        const response = await fetch(url);



        const data = await response.json();



        const stock = data.msgArray[0];



        const currentPrice = parseFloat(stock.z);



        const profit = (currentPrice - buyPrice) * quantity * 1000;



        let advice = "";



        if (currentPrice >= buyPrice * 1.10) {



            advice = "建議：分批停利";



        } else if (currentPrice <= buyPrice * 0.93) {



            advice = "建議：注意停損";



        } else {



            advice = "建議：續抱觀察";



        }



        resultArea.innerHTML = `



            現價：${currentPrice}<br>



            今日損益：${profit.toFixed(0)} 元<br>



            停利區：${(buyPrice * 1.10).toFixed(2)}<br>



            停損區：${(buyPrice * 0.93).toFixed(2)}<br>



            ${advice}



        `;



    } catch (error) {



        resultArea.innerHTML = "讀取失敗，請確認股票代號";



    }



}



</script>



</body>



</html>
