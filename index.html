// 即時股價（iPhone穩定版）



// ========================



async function getStock(code,buy,qty,resultId){



    if(!code || !buy || !qty){



        document.getElementById(resultId).innerHTML =



            "請完整輸入資料";



        return;



    }



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const response = await fetch(url,{



            method:"GET",



            mode:"cors",



            cache:"no-store"



        });



        const data = await response.json();



        if(!data.msgArray || !data.msgArray.length){



            document.getElementById(resultId).innerHTML =



                "查無資料（請確認股票代號）";



            return;



        }



        const stock = data.msgArray[0];



        let price = null;



        if(stock.z && stock.z !== "-"){



            price = parseFloat(stock.z);



        }



        else if(stock.b && stock.b !== "-"){



            price = parseFloat(



                stock.b.split("_")[0]



            );



        }



        else if(stock.a && stock.a !== "-"){



            price = parseFloat(



                stock.a.split("_")[0]



            );



        }



        else if(stock.o && stock.o !== "-"){



            price = parseFloat(stock.o);



        }



        else if(stock.y && stock.y !== "-"){



            price = parseFloat(stock.y);



        }



        if(!price || isNaN(price)){



            document.getElementById(resultId).innerHTML =



                "目前尚無可用即時價格";



            return;



        }



        const volume = stock.v || "0";



        const profit =



            (price - buy) * qty * 1000;



        const takeProfit =



            (buy * 1.10).toFixed(2);



        const stopLoss =



            (buy * 0.93).toFixed(2);



        let advice = "建議：續抱觀察";



        let color = "green";



        if(profit < 0){



            color = "red";



        }



        if(price >= buy * 1.10){



            advice = "建議：分批停利";



        }



        else if(price <= buy * 0.93){



            advice = "建議：注意停損";



        }



        document.getElementById(resultId).innerHTML = `



            現價：${price}<br>



            成交量：${volume}<br>



            今日損益：



            <span class="${color}">



                ${profit.toFixed(0)} 元



            </span><br>



            停利區：${takeProfit}<br>



            停損區：${stopLoss}<br>



            ${advice}



        `;



    }catch(error){



        document.getElementById(resultId).innerHTML =



            "手機讀取失敗，請稍後再試";



    }



}
