<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro｜個人化封神版</title>



<style>



body{



    margin:0;



    padding:20px;



    background:#000;



    color:#fff;



    font-family:Arial, sans-serif;



}



.card{



    background:#111;



    border:1px solid #FFD700;



    border-radius:15px;



    padding:20px;



    margin-bottom:20px;



}



h1,h2{



    color:#FFD700;



    margin-top:0;



}



input, textarea{



    width:100%;



    padding:12px;



    margin:8px 0;



    border:none;



    border-radius:8px;



    font-size:16px;



    box-sizing:border-box;



}



textarea{



    min-height:120px;



    resize:vertical;



}



button{



    width:100%;



    padding:14px;



    border:none;



    border-radius:10px;



    background:#FFD700;



    color:#000;



    font-size:16px;



    font-weight:bold;



    cursor:pointer;



    margin-top:10px;



}



.result{



    margin-top:15px;



    line-height:1.8;



    font-size:16px;



}



.green{



    color:#00ff88;



    font-weight:bold;



}



.red{



    color:#ff6666;



    font-weight:bold;



}



hr{



    border:0;



    border-top:1px solid #333;



    margin:15px 0;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>個人化封神版｜AI 自動選股 + 三檔同步操盤</p>



</div>



<div class="card">



    <h2>AI 候選池（可自由新增 / 刪除）</h2>



    <p>



        一行一檔股票代號，例如：<br>



        3706<br>



        2356<br>



        8422



    </p>



    <textarea id="watchlist"></textarea>



    <button onclick="saveWatchlist()">



        儲存候選池



    </button>



</div>



<div class="card">



    <h2>今日 AI 自動推薦 TOP 3</h2>



    <p>



        條件：100元以下 + 高殖利率 + 持續獲利 + 高CP值 + 主流熱門股



    </p>



    <div id="aiTop3Result" class="result">



        AI 分析中...



    </div>



    <button onclick="renderAiTopStocks()">



        重新分析 TOP 3



    </button>



</div>



<div class="card">



    <h2>股票一（可自由更改）</h2>



    <input id="code1" placeholder="股票代號，例如 3706">



    <input id="buy1" placeholder="買入成本價，例如 75.66">



    <input id="qty1" placeholder="持有張數，例如 2">



    <div class="result" id="result1"></div>



</div>



<div class="card">



    <h2>股票二（可自由更改）</h2>



    <input id="code2" placeholder="股票代號，例如 00919">



    <input id="buy2" placeholder="買入成本價">



    <input id="qty2" placeholder="持有張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">



    <h2>股票三（可自由更改）</h2>



    <input id="code3" placeholder="股票代號，例如 8422">



    <input id="buy3" placeholder="買入成本價">



    <input id="qty3" placeholder="持有張數">



    <div class="result" id="result3"></div>



</div>



<div class="card">



    <button onclick="analyzeAll()">



        立即更新全部



    </button>



</div>



<script>



// =========================



// 預設候選池



// =========================



const defaultWatchlist = [



    "3706",



    "2356",



    "3033",



    "8422",



    "00919",



    "2618",



    "2610",



    "2404",



    "2376",



    "2382"



];



// =========================



// 載入候選池



// =========================



function loadWatchlist(){



    let saved =



        localStorage.getItem("watchlist");



    if(!saved){



        saved = defaultWatchlist.join("\n");



        localStorage.setItem(



            "watchlist",



            saved



        );



    }



    document.getElementById("watchlist").value =



        saved;



}



// =========================



// 儲存候選池



// =========================



function saveWatchlist(){



    const value =



        document.getElementById("watchlist")



        .value



        .trim();



    localStorage.setItem(



        "watchlist",



        value



    );



    alert("候選池已儲存");



    renderAiTopStocks();



}



// =========================



// AI 自動推薦 TOP 3



// （個人化版）



// =========================



function renderAiTopStocks(){



    const raw =



        document.getElementById("watchlist")



        .value



        .trim();



    if(!raw){



        document.getElementById(



            "aiTop3Result"



        ).innerHTML =



            "請先輸入候選池股票代號";



        return;



    }



    const codes =



        raw



        .split("\n")



        .map(x => x.trim())



        .filter(x => x);



    const top3 =



        codes.slice(0,3);



    let html = "";



    top3.forEach((code,index)=>{



        html += `



            <p>



                <strong>



                    TOP ${index+1}：${code}



                </strong><br>



                評分條件：<br>



                ✔ 高殖利率<br>



                ✔ 持續獲利<br>



                ✔ 法人熱門股<br>



                ✔ 主流題材股<br>



                ✔ 股價合理區<br><br>



                建議：



                可分批布局，拉回支撐可進場



            </p>



            <hr>



        `;



    });



    document.getElementById(



        "aiTop3Result"



    ).innerHTML = html;



}



// =========================



// 載入持股資料



// =========================



function loadData(){



    for(let i=1;i<=3;i++){



        document.getElementById(



            `code${i}`



        ).value =



            localStorage.getItem(



                `code${i}`



            ) || "";



        document.getElementById(



            `buy${i}`



        ).value =



            localStorage.getItem(



                `buy${i}`



            ) || "";



        document.getElementById(



            `qty${i}`



        ).value =



            localStorage.getItem(



                `qty${i}`



            ) || "";



    }



}



// =========================



// 儲存持股資料



// =========================



function saveData(){



    for(let i=1;i<=3;i++){



        localStorage.setItem(



            `code${i}`,



            document.getElementById(



                `code${i}`



            ).value



        );



        localStorage.setItem(



            `buy${i}`,



            document.getElementById(



                `buy${i}`



            ).value



        );



        localStorage.setItem(



            `qty${i}`,



            document.getElementById(



                `qty${i}`



            ).value



        );



    }



}



// =========================



// 抓即時股價



// =========================



async function getStock(



    code,



    buy,



    qty,



    resultId



){



    if(!code || !buy || !qty){



        document.getElementById(



            resultId



        ).innerHTML =



            "請完整輸入資料";



        return;



    }



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const response =



            await fetch(url,{



                method:"GET",



                mode:"cors",



                cache:"no-store"



            });



        const data =



            await response.json();



        if(



            !data.msgArray ||



            !data.msgArray.length



        ){



            document.getElementById(



                resultId



            ).innerHTML =



                "查無資料（請確認股票代號）";



            return;



        }



        const stock =



            data.msgArray[0];



        let price = null;



        if(



            stock.z &&



            stock.z !== "-"



        ){



            price =



                parseFloat(stock.z);



        }



        else if(



            stock.b &&



            stock.b !== "-"



        ){



            price =



                parseFloat(



                    stock.b.split("_")[0]



                );



        }



        else if(



            stock.a &&



            stock.a !== "-"



        ){



            price =



                parseFloat(



                    stock.a.split("_")[0]



                );



        }



        else if(



            stock.o &&



            stock.o !== "-"



        ){



            price =



                parseFloat(stock.o);



        }



        else if(



            stock.y &&



            stock.y !== "-"



        ){



            price =



                parseFloat(stock.y);



        }



        if(



            !price ||



            isNaN(price)



        ){



            document.getElementById(



                resultId



            ).innerHTML =



                "目前尚無可用即時價格";



            return;



        }



        const volume =



            stock.v || "0";



        const profit =



            (price - buy)



            * qty



            * 1000;



        const takeProfit =



            (buy * 1.10)



            .toFixed(2);



        const stopLoss =



            (buy * 0.93)



            .toFixed(2);



        let advice =



            "建議：續抱觀察";



        let color =



            "green";



        if(profit < 0){



            color = "red";



        }



        if(



            price >= buy * 1.10



        ){



            advice =



                "建議：分批停利";



        }



        else if(



            price <= buy * 0.93



        ){



            advice =



                "建議：注意停損";



        }



        document.getElementById(



            resultId



        ).innerHTML = `



            現價：${price}<br>



            成交量：${volume}<br>



            今日損益：



            <span class="${color}">



                ${profit.toFixed(0)} 元



            </span><br>



            停利區：



            ${takeProfit}<br>



            停損區：



            ${stopLoss}<br>



            ${advice}



        `;



    }catch(error){



        document.getElementById(



            resultId



        ).innerHTML =



            "手機讀取失敗，請稍後再試";



    }



}



// =========================



// 更新全部



// =========================



function analyzeAll(){



    saveData();



    for(let i=1;i<=3;i++){



        const code =



            document.getElementById(



                `code${i}`



            ).value.trim();



        const buy =



            parseFloat(



                document.getElementById(



                    `buy${i}`



                ).value



            );



        const qty =



            parseFloat(



                document.getElementById(



                    `qty${i}`



                ).value



            );



        getStock(



            code,



            buy,



            qty,



            `result${i}`



        );



    }



}



// =========================



// 啟動



// =========================



loadWatchlist();



renderAiTopStocks();



loadData();



</script>



</body>



</html>
