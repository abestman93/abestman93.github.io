<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro｜神級 AI 自動選股版</title>



<style>



body{



    margin:0;



    padding:20px;



    background:#000;



    color:#fff;



    font-family:Arial, sans-serif;



}



.card{



    background:#111;



    border:1px solid #FFD700;



    border-radius:15px;



    padding:20px;



    margin-bottom:20px;



}



h1,h2{



    color:#FFD700;



    margin-top:0;



}



input{



    width:100%;



    padding:12px;



    margin:8px 0;



    border:none;



    border-radius:8px;



    font-size:16px;



    box-sizing:border-box;



}



button{



    width:100%;



    padding:14px;



    border:none;



    border-radius:10px;



    background:#FFD700;



    color:#000;



    font-size:16px;



    font-weight:bold;



    cursor:pointer;



}



.result{



    margin-top:15px;



    line-height:1.8;



    font-size:16px;



}



.green{



    color:#00ff88;



    font-weight:bold;



}



.red{



    color:#ff6666;



    font-weight:bold;



}



hr{



    border:0;



    border-top:1px solid #333;



    margin:15px 0;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>AI 幫你選股，紀律幫你賺錢</p>



</div>



<div class="card">



    <h2>神級 AI 自動選股版（封神版）</h2>



    <p>



        每日篩選條件：<br>



        ✔ 股價 100 元以下<br>



        ✔ 股價低於淨值<br>



        ✔ 持續獲利<br>



        ✔ 營收成長<br>



        ✔ 毛利穩定<br>



        ✔ 高殖利率 / 高 CP 值



    </p>



    <div id="aiTop3Result">



        載入中...



    </div>



</div>



<div class="card">



    <h2>股票一（可自由更改）</h2>



    <input id="code1" placeholder="股票代號，例如 3706">



    <input id="buy1" placeholder="買入成本價，例如 75.66">



    <input id="qty1" placeholder="持有張數，例如 2">



    <div class="result" id="result1"></div>



</div>



<div class="card">



    <h2>股票二（可自由更改）</h2>



    <input id="code2" placeholder="股票代號，例如 00919">



    <input id="buy2" placeholder="買入成本價">



    <input id="qty2" placeholder="持有張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">



    <h2>股票三（可自由更改）</h2>



    <input id="code3" placeholder="股票代號，例如 8422">



    <input id="buy3" placeholder="買入成本價">



    <input id="qty3" placeholder="持有張數">



    <div class="result" id="result3"></div>



</div>



<div class="card">



    <button onclick="analyzeAll()">立即更新全部</button>



</div>



<script>



// =========================



// 神級 AI 自動選股（可自行每日修改）



// =========================



const aiTopStocks = [



    {



        code: "3706",



        name: "神達",



        priceRange: "80～90",



        reason: "AI伺服器 + 持續獲利 + 法人關注 + 本益比合理",



        advice: "突破量增可分批布局"



    },



    {



        code: "2356",



        name: "英業達",



        priceRange: "40～50",



        reason: "AI伺服器 + 長期穩定獲利 + 淨值保護強",



        advice: "拉回支撐可進場"



    },



    {



        code: "3033",



        name: "威健",



        priceRange: "30～40",



        reason: "高殖利率 + 穩定配息 + 股價相對低估",



        advice: "適合波段與領息雙策略"



    }



];



function renderAiTopStocks(){



    let html = "";



    aiTopStocks.forEach((stock, index) => {



        html += `



            <p>



                <strong>TOP ${index + 1}：${stock.code} ${stock.name}</strong><br>



                建議買進區：${stock.priceRange} 元<br>



                條件：${stock.reason}<br>



                建議：${stock.advice}



            </p>



            <hr>



        `;



    });



    document.getElementById("aiTop3Result").innerHTML = html;



}



// =========================



// 載入資料



// =========================



function loadData(){



    for(let i=1;i<=3;i++){



        document.getElementById(`code${i}`).value =



            localStorage.getItem(`code${i}`) || "";



        document.getElementById(`buy${i}`).value =



            localStorage.getItem(`buy${i}`) || "";



        document.getElementById(`qty${i}`).value =



            localStorage.getItem(`qty${i}`) || "";



    }



}



// =========================



// 儲存資料



// =========================



function saveData(){



    for(let i=1;i<=3;i++){



        localStorage.setItem(`code${i}`,



            document.getElementById(`code${i}`).value);



        localStorage.setItem(`buy${i}`,



            document.getElementById(`buy${i}`).value);



        localStorage.setItem(`qty${i}`,



            document.getElementById(`qty${i}`).value);



    }



}



// =========================



// 股票即時資料（iPhone穩定版）



// =========================



async function getStock(code, buy, qty, resultId){



    if(!code || !buy || !qty){



        document.getElementById(resultId).innerHTML =



            "請完整輸入資料";



        return;



    }



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const response = await fetch(url,{



            method:"GET",



            mode:"cors",



            cache:"no-store"



        });



        const data = await response.json();



        if(!data.msgArray || !data.msgArray.length){



            document.getElementById(resultId).innerHTML =



                "查無資料（請確認股票代號）";



            return;



        }



        const stock = data.msgArray[0];



        let price = null;



        if(stock.z && stock.z !== "-"){



            price = parseFloat(stock.z);



        }



        else if(stock.b && stock.b !== "-"){



            const bid = stock.b.split("_")[0];



            if(bid && bid !== "-"){



                price = parseFloat(bid);



            }



        }



        else if(stock.a && stock.a !== "-"){



            const ask = stock.a.split("_")[0];



            if(ask && ask !== "-"){



                price = parseFloat(ask);



            }



        }



        else if(stock.o && stock.o !== "-"){



            price = parseFloat(stock.o);



        }



        else if(stock.y && stock.y !== "-"){



            price = parseFloat(stock.y);



        }



        if(!price || isNaN(price)){



            document.getElementById(resultId).innerHTML =



                "目前尚無可用即時價格";



            return;



        }



        const volume = stock.v || "0";



        const profit =



            (price - buy) * qty * 1000;



        const takeProfit =



            (buy * 1.10).toFixed(2);



        const stopLoss =



            (buy * 0.93).toFixed(2);



        let advice = "";



        let color = "green";



        if(profit < 0){



            color = "red";



        }



        if(price >= buy * 1.10){



            advice = "建議：分批停利";



        }



        else if(price <= buy * 0.93){



            advice = "建議：注意停損";



        }



        else{



            advice = "建議：續抱觀察";



        }



        document.getElementById(resultId).innerHTML = `



            現價：${price}<br>



            成交量：${volume}<br>



            今日損益：



            <span class="${color}">



                ${profit.toFixed(0)} 元



            </span><br>



            停利區：${takeProfit}<br>



            停損區：${stopLoss}<br>



            ${advice}



        `;



    }catch(error){



        document.getElementById(resultId).innerHTML =



            "手機讀取失敗，請稍後再試";



    }



}



// =========================



// 更新全部



// =========================



function analyzeAll(){



    saveData();



    for(let i=1;i<=3;i++){



        const code =



            document.getElementById(`code${i}`).value.trim();



        const buy =



            parseFloat(



                document.getElementById(`buy${i}`).value



            );



        const qty =



            parseFloat(



                document.getElementById(`qty${i}`).value



            );



        getStock(



            code,



            buy,



            qty,



            `result${i}`



        );



    }



}



// =========================



// 啟動



// =========================



renderAiTopStocks();



loadData();



</script>



</body>



</html>
