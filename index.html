<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro</title>



<style>



body {



    background: #000;



    color: white;



    font-family: Arial;



    margin: 0;



    padding: 20px;



}



.card {



    background: #111;



    border: 1px solid #FFD700;



    border-radius: 15px;



    padding: 20px;



    margin-bottom: 20px;



}



h1, h2 {



    color: #FFD700;



}



input {



    width: 100%;



    padding: 10px;



    margin: 8px 0;



    border-radius: 8px;



    border: none;



}



button {



    width: 100%;



    padding: 12px;



    background: #FFD700;



    border: none;



    font-weight: bold;



    border-radius: 10px;



    cursor: pointer;



}



.result {



    margin-top: 15px;



    font-size: 16px;



    line-height: 1.8;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>AI 幫你選股，紀律幫你賺錢</p>



</div>



<div class="card">



    <h2>今日操作建議</h2>



    <p>神達：續抱觀察</p>



    <p>00919：持續領息</p>



    <p>英業達：突破再進場</p>



</div>



<div class="card">



    <h2>今日最強 AI 股 TOP 3</h2>



    <p>TOP1：神達</p>



    <p>TOP2：英業達</p>



    <p>TOP3：緯創</p>



</div>



<div class="card">



    <h2>股票一</h2>



    <input id="code1" placeholder="股票代號">



    <input id="buy1" placeholder="買入成本價">



    <input id="qty1" placeholder="持有張數">



    <div class="result" id="result1"></div>



</div>



<div class="card">



    <h2>股票二</h2>



    <input id="code2" placeholder="股票代號">



    <input id="buy2" placeholder="買入成本價">



    <input id="qty2" placeholder="持有張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">



    <h2>股票三</h2>



    <input id="code3" placeholder="股票代號">



    <input id="buy3" placeholder="買入成本價">



    <input id="qty3" placeholder="持有張數">



    <div class="result" id="result3"></div>



</div>



<div class="card">



    <button onclick="analyzeAll()">立即更新全部</button>



</div>



<script>



function saveData() {



    for (let i = 1; i <= 3; i++) {



        localStorage.setItem(`code${i}`, document.getElementById(`code${i}`).value);



        localStorage.setItem(`buy${i}`, document.getElementById(`buy${i}`).value);



        localStorage.setItem(`qty${i}`, document.getElementById(`qty${i}`).value);



    }



}



function loadData() {



    for (let i = 1; i <= 3; i++) {



        document.getElementById(`code${i}`).value = localStorage.getItem(`code${i}`) || "";



        document.getElementById(`buy${i}`).value = localStorage.getItem(`buy${i}`) || "";



        document.getElementById(`qty${i}`).value = localStorage.getItem(`qty${i}`) || "";



    }



}



async function getStock(code, buy, qty, resultId) {



    if (!code || !buy || !qty) return;



    try {



        const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${code}.tw`;



        const response = await fetch(url);



        const data = await response.json();



        const stock = data.msgArray[0];



        const price = parseFloat(stock.z);



        const profit = (price - buy) * qty * 1000;



        const takeProfit = (buy * 1.10).toFixed(2);



        const stopLoss = (buy * 0.93).toFixed(2);



        let advice = "續抱觀察";



        if (price >= buy * 1.10) advice = "建議分批停利";



        if (price <= buy * 0.93) advice = "建議注意停損";



        document.getElementById(resultId).innerHTML = `



            現價：${price}<br>



            今日損益：${profit.toFixed(0)} 元<br>



            停利區：${takeProfit}<br>



            停損區：${stopLoss}<br>



            ${advice}



        `;



    } catch {



        document.getElementById(resultId).innerHTML = "讀取失敗";



    }



}



async function analyzeAll() {



    saveData();



    for (let i = 1; i <= 3; i++) {



        const code = document.getElementById(`code${i}`).value;



        const buy = parseFloat(document.getElementById(`buy${i}`).value);



        const qty = parseFloat(document.getElementById(`qty${i}`).value);



        getStock(code, buy, qty, `result${i}`);



    }



}



loadData();



</script>



</body>



</html>
