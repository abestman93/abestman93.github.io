<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro｜真正盤中變動版</title>



<style>



body{



    margin:0;



    padding:20px;



    background:#000;



    color:#fff;



    font-family:Arial,sans-serif;



}



.card{



    background:#111;



    border:1px solid #FFD700;



    border-radius:16px;



    padding:20px;



    margin-bottom:20px;



}



h1,h2{



    color:#FFD700;



    margin-top:0;



}



textarea,input,select{



    width:100%;



    padding:12px;



    margin:8px 0;



    border:none;



    border-radius:8px;



    font-size:16px;



    box-sizing:border-box;



}



textarea{



    min-height:180px;



    resize:vertical;



}



button{



    width:100%;



    padding:14px;



    border:none;



    border-radius:10px;



    background:#FFD700;



    color:#000;



    font-size:16px;



    font-weight:bold;



    cursor:pointer;



    margin-top:10px;



}



.result{



    margin-top:15px;



    line-height:1.8;



}



.green{



    color:#00ff88;



    font-weight:bold;



}



.red{



    color:#ff6666;



    font-weight:bold;



}



hr{



    border:0;



    border-top:1px solid #333;



    margin:15px 0;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>真正盤中變動版｜即時 TOP3 + 三檔同步操盤</p>



</div>



<div class="card">



    <h2>候選池（18檔可自由修改）</h2>



    <textarea id="watchlist"></textarea>



    <button onclick="saveWatchlist()">



        儲存候選池



    </button>



</div>



<div class="card">



    <h2>操盤模式</h2>



    <select id="mode">



        <option value="attack">攻擊型（AI股優先）</option>



        <option value="balance">平衡型（平均配置）</option>



        <option value="defense">防守型（高殖利率優先）</option>



    </select>



    <button onclick="renderTop3()">



        套用模式 + 即時重算



    </button>



</div>



<div class="card">



    <h2>今日 AI 自動推薦 TOP 3（盤中即時變動）</h2>



    <div id="top3" class="result">



        AI 分析中...



    </div>



    <button onclick="renderTop3()">



        立即刷新 TOP 3



    </button>



</div>



<script>



/* =========================



預設候選池 18 檔



========================= */



const defaultList = [



"3706",



"2356",



"3033",



"00919",



"00929",



"2618",



"2610",



"8422",



"2884",



"2886",



"2891",



"5876",



"2404",



"2376",



"2382",



"3231",



"3711",



"2383"



];



/* =========================



AI 主流股



========================= */



const aiStocks = [



"3706","2356","3033","2376","2382","3231"



];



/* =========================



高殖利率股



========================= */



const dividendStocks = [



"00919","00929","2884","2886","2891","5876","2618"



];



/* =========================



載入候選池



========================= */



function loadWatchlist(){



    let saved =



        localStorage.getItem("watchlist");



    if(!saved){



        saved = defaultList.join("\n");



        localStorage.setItem(



            "watchlist",



            saved



        );



    }



    document.getElementById(



        "watchlist"



    ).value = saved;



}



/* =========================



儲存候選池



========================= */



function saveWatchlist(){



    const value =



        document.getElementById(



            "watchlist"



        ).value.trim();



    localStorage.setItem(



        "watchlist",



        value



    );



    alert("候選池已儲存");



    renderTop3();



}



/* =========================



抓即時資料



========================= */



async function fetchStock(code){



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const res =



            await fetch(url,{



                method:"GET",



                mode:"cors",



                cache:"no-store"



            });



        const data =



            await res.json();



        if(



            !data.msgArray ||



            !data.msgArray.length



        ){



            return null;



        }



        const s =



            data.msgArray[0];



        let price = null;



        if(s.z && s.z !== "-"){



            price = parseFloat(s.z);



        }



        else if(s.b && s.b !== "-"){



            price = parseFloat(



                s.b.split("_")[0]



            );



        }



        else if(s.a && s.a !== "-"){



            price = parseFloat(



                s.a.split("_")[0]



            );



        }



        else if(s.o && s.o !== "-"){



            price = parseFloat(s.o);



        }



        else if(s.y && s.y !== "-"){



            price = parseFloat(s.y);



        }



        if(!price || isNaN(price)){



            return null;



        }



        return {



            code: code,



            price: price,



            volume: parseInt(s.v || 0),



            high: parseFloat(s.h || price),



            low: parseFloat(s.l || price)



        };



    }catch(e){



        return null;



    }



}



/* =========================



真正評分系統



========================= */



function calcScore(stock){



    let score = 0;



    let reason = [];



    const mode =



        document.getElementById("mode").value;



    /* 成交量 */



    if(stock.volume >= 10000){



        score += 30;



        reason.push("大量成交");



    }



    else if(stock.volume >= 3000){



        score += 20;



        reason.push("量能穩定");



    }



    else if(stock.volume >= 1000){



        score += 10;



    }



    /* 百元以下 */



    if(stock.price <= 100){



        score += 20;



        reason.push("百元以下");



    }



    /* 低檔區 */



    const range =



        stock.high - stock.low;



    if(range > 0){



        const pos =



            (stock.price - stock.low)



            / range;



        if(pos <= 0.35){



            score += 20;



            reason.push("接近低檔");



        }



        else if(pos <= 0.60){



            score += 10;



        }



    }



    /* 模式加權 */



    if(mode === "attack"){



        if(aiStocks.includes(stock.code)){



            score += 35;



            reason.push("AI主流股");



        }



    }



    if(mode === "balance"){



        if(aiStocks.includes(stock.code)){



            score += 20;



            reason.push("主流熱門股");



        }



        if(dividendStocks.includes(stock.code)){



            score += 15;



            reason.push("高殖利率");



        }



    }



    if(mode === "defense"){



        if(dividendStocks.includes(stock.code)){



            score += 35;



            reason.push("高殖利率");



        }



        if(aiStocks.includes(stock.code)){



            score += 10;



        }



    }



    return {



        score,



        reason:



            reason.join("、")



    };



}



/* =========================



即時 TOP3



========================= */



async function renderTop3(){



    document.getElementById(



        "top3"



    ).innerHTML =



        "AI 正在盤中即時分析，請稍候...";



    const raw =



        document.getElementById(



            "watchlist"



        ).value



        .trim();



    const codes =



        raw.split("\n")



        .map(x=>x.trim())



        .filter(x=>x);



    let list = [];



    for(const code of codes){



        const stock =



            await fetchStock(code);



        if(!stock) continue;



        const ai =



            calcScore(stock);



        list.push({



            ...stock,



            score: ai.score,



            reason: ai.reason



        });



    }



    list.sort(



        (a,b)=>b.score-a.score



    );



    const top3 =



        list.slice(0,3);



    let html = "";



    top3.forEach((s,i)=>{



        html += `



            <p>



                <strong>



                    TOP ${i+1}：



                    ${s.code}



                    （${s.score}分）



                </strong><br>



                現價：${s.price}<br>



                成交量：${s.volume}<br>



                原因：



                ${s.reason}<br><br>



                建議：



                拉回支撐可分批布局



            </p>



            <hr>



        `;



    });



    document.getElementById(



        "top3"



    ).innerHTML =



        html || "目前無法取得資料";



}



/* =========================



啟動



========================= */



loadWatchlist();



renderTop3();



</script>



</body>



</html>
