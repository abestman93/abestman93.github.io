<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>監控系統（不卡版）</title>

<style>
body { font-family: Arial; padding: 20px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px;}
.strong { background:#ffe5e5;}
.ready { background:#fff5cc;}
</style>

</head>

<body>

<h1>📈 即時監控（不卡版）</h1>

<p id="status">載入中...</p>
<div id="result"></div>

<script>
const API = "https://stock-proxy-v2.abestman93.workers.dev/real";

// ===== 先顯示快取 =====
const cache = localStorage.getItem("stockData");
if (cache) {
  render(JSON.parse(cache));
}

// ===== 再抓最新 =====
load();

async function load() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    const data = await res.json();

    // 存快取
    localStorage.setItem("stockData", JSON.stringify(data));

    render(data);

  } catch(e) {
    document.getElementById("status").innerText = "讀取失敗";
  }
}

// ===== 畫面 =====
function render(data) {
  const status = document.getElementById("status");
  const result = document.getElementById("result");

  status.innerText = "更新時間: " + data.updateTime;
  result.innerHTML = "";

  show("🔥 強勢股", data.strong, "strong");
  show("⚡ 準備股", data.ready, "ready");
}

function show(title, list, cls) {
  if (!list || list.length === 0) return;

  const result = document.getElementById("result");
  result.innerHTML += "<h2>" + title + "</h2>";

  list.forEach(s => {
    result.innerHTML += `
      <div class="card ${cls}">
        <b>${s.name} (${s.code})</b><br>
        價格：${s.price}｜漲跌：${s.change}<br>
        分數：${s.score}<br>
        動作：${s.action}
      </div>
    `;
  });
}

// 每30秒更新
setInterval(load, 30000);

</script>

</body>
</html>
