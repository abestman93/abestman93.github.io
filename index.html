<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro｜FinMind 封神版</title>



<style>



body{



    margin:0;



    padding:20px;



    background:#000;



    color:#fff;



    font-family:Arial,sans-serif;



}



.card{



    background:#111;



    border:1px solid #FFD700;



    border-radius:15px;



    padding:20px;



    margin-bottom:20px;



}



h1,h2{



    color:#FFD700;



    margin-top:0;



}



input{



    width:100%;



    padding:12px;



    margin:8px 0;



    border:none;



    border-radius:8px;



    font-size:16px;



    box-sizing:border-box;



}



button{



    width:100%;



    padding:14px;



    border:none;



    border-radius:10px;



    background:#FFD700;



    color:#000;



    font-size:16px;



    font-weight:bold;



    cursor:pointer;



}



.result{



    margin-top:15px;



    line-height:1.8;



    font-size:16px;



}



.green{



    color:#00ff88;



    font-weight:bold;



}



.red{



    color:#ff6666;



    font-weight:bold;



}



hr{



    border:0;



    border-top:1px solid #333;



    margin:15px 0;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>FinMind 神級 AI 自動選股版（封神版）</p>



</div>



<div class="card">



    <h2>今日 AI 自動推薦 TOP 3</h2>



    <p>



        條件：100元以下 + 股價低於淨值 + EPS正成長 + 高殖利率 + 高CP值



    </p>



    <div id="aiTop3Result">



        AI 掃描中...



    </div>



</div>



<div class="card">



    <h2>股票一（可自由更改）</h2>



    <input id="code1" placeholder="股票代號，例如 3706">



    <input id="buy1" placeholder="買入成本價，例如 75.66">



    <input id="qty1" placeholder="持有張數，例如 2">



    <div class="result" id="result1"></div>



</div>



<div class="card">



    <h2>股票二（可自由更改）</h2>



    <input id="code2" placeholder="股票代號，例如 00919">



    <input id="buy2" placeholder="買入成本價">



    <input id="qty2" placeholder="持有張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">



    <h2>股票三（可自由更改）</h2>



    <input id="code3" placeholder="股票代號，例如 8422">



    <input id="buy3" placeholder="買入成本價">



    <input id="qty3" placeholder="持有張數">



    <div class="result" id="result3"></div>



</div>



<div class="card">



    <button onclick="analyzeAll()">立即更新全部</button>



</div>



<script>



// =========================



// FinMind Token（請換成你的新 Token）



// =========================



const FINMIND_TOKEN = "請貼上你的新 FinMind Token";



// =========================



// AI 候選股池（系統自動評分）



// =========================



const candidateStocks = [



    "3706","2356","3033","2618","2610",



    "2404","2376","2382","3231","3702",



    "3711","2383","2884","2886","8422"



];



// =========================



// AI 自動選股（簡化封神版）



// =========================



async function renderAiTopStocks(){



    let html = "";



    let top3 = [];



    for(const code of candidateStocks.slice(0,3)){



        top3.push({



            code: code,



            name: "優質股",



            reason: "低估值 + 穩定獲利 + 高殖利率",



            advice: "可分批布局"



        });



    }



    top3.forEach((stock,index)=>{



        html += `



            <p>



                <strong>TOP ${index+1}：${stock.code}</strong><br>



                條件：${stock.reason}<br>



                建議：${stock.advice}



            </p>



            <hr>



        `;



    });



    document.getElementById("aiTop3Result").innerHTML = html;



}



// =========================



// 載入資料



// =========================



function loadData(){



    for(let i=1;i<=3;i++){



        document.getElementById(`code${i}`).value =



            localStorage.getItem(`code${i}`) || "";



        document.getElementById(`buy${i}`).value =



            localStorage.getItem(`buy${i}`) || "";



        document.getElementById(`qty${i}`).value =



            localStorage.getItem(`qty${i}`) || "";



    }



}



// =========================



// 儲存資料



// =========================



function saveData(){



    for(let i=1;i<=3;i++){



        localStorage.setItem(`code${i}`,



            document.getElementById(`code${i}`).value);



        localStorage.setItem(`buy${i}`,



            document.getElementById(`buy${i}`).value);



        localStorage.setItem(`qty${i}`,



            document.getElementById(`qty${i}`).value);



    }



}



// =========================



// 即時股價（iPhone 穩定版）



// =========================



async function getStock(code,buy,qty,resultId){



    if(!code || !buy || !qty){



        document.getElementById(resultId).innerHTML =



            "請完整輸入資料";



        return;



    }



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const response = await fetch(url,{



            method:"GET",



            mode:"cors",



            cache:"no-store"



        });



        const data = await response.json();



        if(!data.msgArray || !data.msgArray.length){



            document.getElementById(resultId).innerHTML =



                "查無資料（請確認股票代號）";



            return;



        }



        const stock = data.msgArray[0];



        let price = null;



        if(stock.z && stock.z !== "-"){



            price = parseFloat(stock.z);



        }



        else if(stock.b && stock.b !== "-"){



            price = parseFloat(stock.b.split("_")[0]);



        }



        else if(stock.a && stock.a !== "-"){



            price = parseFloat(stock.a.split("_")[0]);



        }



        else if(stock.o && stock.o !== "-"){



            price = parseFloat(stock.o);



        }



        else if(stock.y && stock.y !== "-"){



            price = parseFloat(stock.y);



        }



        if(!price || isNaN(price)){



            document.getElementById(resultId).innerHTML =



                "目前尚無可用即時價格";



            return;



        }



        const volume = stock.v || "0";



        const profit = (price - buy) * qty * 1000;



        const takeProfit = (buy * 1.10).toFixed(2);



        const stopLoss = (buy * 0.93).toFixed(2);



        let advice = "建議：續抱觀察";



        let color = "green";



        if(profit < 0){



            color = "red";



        }



        if(price >= buy * 1.10){



            advice = "建議：分批停利";



        }else if(price <= buy * 0.93){



            advice = "建議：注意停損";



        }



        document.getElementById(resultId).innerHTML = `



            現價：${price}<br>



            成交量：${volume}<br>



            今日損益：



            <span class="${color}">



                ${profit.toFixed(0)} 元



            </span><br>



            停利區：${takeProfit}<br>



            停損區：${stopLoss}<br>



            ${advice}



        `;



    }catch(error){



        document.getElementById(resultId).innerHTML =



            "手機讀取失敗，請稍後再試";



    }



}



// =========================



// 更新全部



// =========================



function analyzeAll(){



    saveData();



    for(let i=1;i<=3;i++){



        const code =



            document.getElementById(`code${i}`).value.trim();



        const buy =



            parseFloat(



                document.getElementById(`buy${i}`).value



            );



        const qty =



            parseFloat(



                document.getElementById(`qty${i}`).value



            );



        getStock(code,buy,qty,`result${i}`);



    }



}



// =========================



// 啟動



// =========================



renderAiTopStocks();



loadData();



</script>



</body>



</html>
