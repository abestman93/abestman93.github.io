<body>

    <h1>建智操盤神器 Pro</h1>

</div>



<div class="card">



    <h2>AI 候選池（可自由新增 / 刪除）</h2>

        一行一檔股票代號，例如：<br>



        3706<br>



        2356<br>



        8422



    </p>



    <textarea id="watchlist"></textarea>



    <button onclick="saveWatchlist()">



        儲存候選池



    </button>



</div>



<div class="card">



    <h2>今日 AI 自動推薦 TOP 3</h2>



    <p>



        真實評分邏輯：<br>



        ✔ 成交量<br>



        ✔ 價格位置<br>



        ✔ 波段強度<br>



        ✔ 主流熱門股<br>



        ✔ 高殖利率概念股<br>



        ✔ 法人關注度（簡化版）



    </p>



    <div id="aiTop3Result" class="result">



        AI 分析中...

</div>



<div class="card">

    <input id="code1" placeholder="股票代號，例如 3706">

</div>



<div class="card">

    <input id="code2" placeholder="股票代號，例如 00919">



    <input id="buy2" placeholder="買入成本價">



    <input id="qty2" placeholder="持有張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">

    <input id="code3" placeholder="股票代號，例如 8422">

        立即更新全部

<script>



/* =========================



預設候選池



========================= */



const defaultWatchlist = [



    "3706",



    "2356",



    "3033",



    "8422",



    "00919",



    "2618",



    "2610",



    "2404",



    "2376",



    "2382"



];



/* =========================



主流熱門股加分池



========================= */



const hotStocks = [



    "3706",



    "2356",



    "3033",



    "2382",



    "2376",



    "00919",



    "00929",



    "2618",



    "2610"



];



/* =========================



載入候選池



========================= */



function loadWatchlist(){



    let saved = localStorage.getItem("watchlist");



    if(!saved){



        saved = defaultWatchlist.join("\n");



        localStorage.setItem("watchlist", saved);



    }



    document.getElementById("watchlist").value = saved;



}



/* =========================



儲存候選池



========================= */



function saveWatchlist(){



    const value = document.getElementById("watchlist").value.trim();



    localStorage.setItem("watchlist", value);



    alert("候選池已儲存");



    renderAiTopStocks();



}



/* =========================



抓股票資料



========================= */



async function fetchStockData(code){



    const url =



`https://stock-proxy.abestman93.workers.dev/?code=${code}&t=${Date.now()}`;



    try{



        const response = await fetch(url,{



            method:"GET",



            mode:"cors",



            cache:"no-store"



        });



        const data = await response.json();



        if(!data.msgArray || !data.msgArray.length){



            return null;



        }



        const stock = data.msgArray[0];



        let price = null;



        if(stock.z && stock.z !== "-"){



            price = parseFloat(stock.z);



        }



        else if(stock.b && stock.b !== "-"){



            price = parseFloat(stock.b.split("_")[0]);



        }



        else if(stock.a && stock.a !== "-"){



            price = parseFloat(stock.a.split("_")[0]);



        }



        else if(stock.o && stock.o !== "-"){



            price = parseFloat(stock.o);



        }



        else if(stock.y && stock.y !== "-"){



            price = parseFloat(stock.y);



        }



        if(!price || isNaN(price)){



            return null;



        }



        return {



            code: code,



            price: price,



            volume: parseInt(stock.v || 0),



            high: parseFloat(stock.h || price),



            low: parseFloat(stock.l || price),



            yesterday: parseFloat(stock.y || price)



        };



    }catch(e){



        return null;



    }



}



/* =========================



AI 評分引擎（真正排序）



========================= */



function calculateScore(stock){



    let score = 0;



    let reason = [];



    /* 1. 成交量分數 */



    if(stock.volume >= 10000){



        score += 30;



        reason.push("大量成交");



    }



    else if(stock.volume >= 3000){



        score += 20;



        reason.push("量能穩定");



    }



    else if(stock.volume >= 1000){



        score += 10;



    }



    /* 2. 股價 100 元以下 */



    if(stock.price <= 100){



        score += 20;



        reason.push("百元以下");



    }



    /* 3. 接近低檔區 */



    const range = stock.high - stock.low;



    if(range > 0){



        const position =



            (stock.price - stock.low) / range;



        if(position <= 0.35){



            score += 20;



            reason.push("接近低檔");



        }



        else if(position <= 0.60){



            score += 10;



        }



    }



    /* 4. 主流熱門股 */



    if(hotStocks.includes(stock.code)){



        score += 20;



        reason.push("主流熱門股");



    }



    /* 5. 高殖利率概念（簡化版） */



    if(



        stock.code === "00919" ||



        stock.code === "00929" ||



        stock.code === "3033" ||



        stock.code === "2884" ||



        stock.code === "2886"



    ){



        score += 15;



        reason.push("高殖利率");



    }



    return {



        score,



        reason: reason.join("、")



    };



}



/* =========================



真正 AI TOP3 排序



========================= */



async function renderAiTopStocks(){



    document.getElementById("aiTop3Result").innerHTML =



        "AI 正在逐檔分析候選池，請稍候...";



    const raw =



        document.getElementById("watchlist")



        .value



        .trim();



    if(!raw){



        document.getElementById("aiTop3Result").innerHTML =



            "請先輸入候選池股票代號";



        return;



    }



    const codes =



        raw.split("\n")



        .map(x => x.trim())



        .filter(x => x);



    let scoredStocks = [];



    for(const code of codes){



        const stock = await fetchStockData(code);



        if(!stock) continue;



        const ai = calculateScore(stock);



        scoredStocks.push({



            ...stock,



            score: ai.score,



            reason: ai.reason



        });



    }



    scoredStocks.sort((a,b)=>b.score-a.score);



    const top3 = scoredStocks.slice(0,3);



    if(!top3.length){



        document.getElementById("aiTop3Result").innerHTML =



            "目前無法取得資料";



        return;



    }



    let html = "";



    top3.forEach((stock,index)=>{



        html += `



            <p>



                <strong>



                    TOP ${index+1}：${stock.code}



                    （${stock.score} 分）



                </strong><br>



                現價：${stock.price}<br>



                成交量：${stock.volume}<br>



                評分原因：<br>



                ${stock.reason || "基本條件符合"}<br><br>



                建議：



                可分批布局，拉回支撐區可進場



            </p>



            <hr>



        `;



    });



    document.getElementById("aiTop3Result").innerHTML = html;



}



/* =========================



持股資料



========================= */



function loadData(){



    for(let i=1;i<=3;i++){



        document.getElementById(`code${i}`).value =



            localStorage.getItem(`code${i}`) || "";



        document.getElementById(`buy${i}`).value =



            localStorage.getItem(`buy${i}`) || "";



        document.getElementById(`qty${i}`).value =



            localStorage.getItem(`qty${i}`) || "";



    }



}



function saveData(){



    for(let i=1;i<=3;i++){



        localStorage.setItem(



            `code${i}`,



            document.getElementById(`code${i}`).value



        );



        localStorage.setItem(



            `buy${i}`,



            document.getElementById(`buy${i}`).value



        );



        localStorage.setItem(



            `qty${i}`,



            document.getElementById(`qty${i}`).value



        );



    }



}



/* =========================



三檔同步監控



========================= */



async function getStock(code,buy,qty,resultId){



    if(!code || !buy || !qty){



        document.getElementById(resultId).innerHTML =



            "請完整輸入資料";



        return;



    }



    const stock = await fetchStockData(code);



    if(!stock){



        document.getElementById(resultId).innerHTML =



            "查無資料（請確認股票代號）";



        return;



    }



    const profit =



        (stock.price - buy) * qty * 1000;



    const takeProfit =



        (buy * 1.10).toFixed(2);



    const stopLoss =



        (buy * 0.93).toFixed(2);



    let advice = "建議：續抱觀察";



    let color = "green";



    if(profit < 0){



        color = "red";



    }



    if(stock.price >= buy * 1.10){



        advice = "建議：分批停利";



    }



    else if(stock.price <= buy * 0.93){



        advice = "建議：注意停損";



    }



    document.getElementById(resultId).innerHTML = `



        現價：${stock.price}<br>



        成交量：${stock.volume}<br>



        今日損益：



        <span class="${color}">



            ${profit.toFixed(0)} 元



        </span><br>



        停利區：${takeProfit}<br>



        停損區：${stopLoss}<br>



        ${advice}



    `;



}



function analyzeAll(){



    saveData();



    for(let i=1;i<=3;i++){



        const code =



            document.getElementById(`code${i}`).value.trim();



        const buy =



            parseFloat(



                document.getElementById(`buy${i}`).value



            );



        const qty =



            parseFloat(



                document.getElementById(`qty${i}`).value



            );



        getStock(



            code,



            buy,



            qty,



            `result${i}`



        );



    }



}



/* =========================



啟動



========================= */



loadWatchlist();



loadData();



renderAiTopStocks();



</script>
