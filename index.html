<!DOCTYPE html>



<html lang="zh-TW">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>建智操盤神器 Pro</title>



<style>



body{



    background:#000;



    color:#fff;



    font-family:Arial;



    padding:20px;



    margin:0;



}



.card{



    background:#111;



    border:1px solid #FFD700;



    border-radius:15px;



    padding:20px;



    margin-bottom:20px;



}



h1,h2{



    color:#FFD700;



}



input{



    width:100%;



    padding:10px;



    margin:8px 0;



    border:none;



    border-radius:8px;



}



button{



    width:100%;



    padding:12px;



    border:none;



    border-radius:10px;



    background:#FFD700;



    font-weight:bold;



}



.result{



    margin-top:15px;



    line-height:1.8;



}



</style>



</head>



<body>



<div class="card">



    <h1>建智操盤神器 Pro</h1>



    <p>三檔同步自動操盤系統</p>



</div>



<div class="card">



    <h2>股票一</h2>



    <input id="code1" placeholder="股票代號，例如 3706">



    <input id="buy1" placeholder="成本價，例如 75.66">



    <input id="qty1" placeholder="張數，例如 2">



    <div class="result" id="result1"></div>



</div>



<div class="card">



    <h2>股票二</h2>



    <input id="code2" placeholder="股票代號，例如 00919">



    <input id="buy2" placeholder="成本價">



    <input id="qty2" placeholder="張數">



    <div class="result" id="result2"></div>



</div>



<div class="card">



    <h2>股票三</h2>



    <input id="code3" placeholder="股票代號，例如 2356">



    <input id="buy3" placeholder="成本價">



    <input id="qty3" placeholder="張數">



    <div class="result" id="result3"></div>



</div>



<div class="card">



    <button onclick="analyzeAll()">立即更新全部</button>



</div>



<script>



function getMarket(code){



    if(code.startsWith("6") || code.startsWith("7") || code.startsWith("8")){



        return "otc";



    }



    return "tse";



}



async function getStock(code,buy,qty,resultId){



    if(!code || !buy || !qty){



        document.getElementById(resultId).innerHTML = "請完整輸入資料";



        return;



    }



    const market = getMarket(code);



    const url =



`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${market}_${code}.tw&json=1&delay=0`;



    try{



        const response = await fetch(url);



        const data = await response.json();



        if(!data.msgArray || !data.msgArray.length){



            document.getElementById(resultId).innerHTML = "查無資料";



            return;



        }



        const stock = data.msgArray[0];



        const price = parseFloat(stock.z || stock.y);



        if(isNaN(price)){



            document.getElementById(resultId).innerHTML = "暫無即時成交價";



            return;



        }



        const profit = (price - buy) * qty * 1000;



        const takeProfit = (buy * 1.10).toFixed(2);



        const stopLoss = (buy * 0.93).toFixed(2);



        let advice = "續抱觀察";



        if(price >= buy * 1.10){



            advice = "建議：分批停利";



        }else if(price <= buy * 0.93){



            advice = "建議：注意停損";



        }



        document.getElementById(resultId).innerHTML = `



            現價：${price}<br>



            今日損益：${profit.toFixed(0)} 元<br>



            停利區：${takeProfit}<br>



            停損區：${stopLoss}<br>



            ${advice}



        `;



    }catch(e){



        document.getElementById(resultId).innerHTML = "讀取失敗（API/CORS）";



    }



}



function analyzeAll(){



    for(let i=1;i<=3;i++){



        const code = document.getElementById(`code${i}`).value.trim();



        const buy = parseFloat(document.getElementById(`buy${i}`).value);



        const qty = parseFloat(document.getElementById(`qty${i}`).value);



        getStock(code,buy,qty,`result${i}`);



    }



}



</script>



</body>



</html>
