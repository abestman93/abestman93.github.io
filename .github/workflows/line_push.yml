name: Stock Monitor (TG)

on:
  schedule:
    # 台股開盤期間 (台灣時間 9:00-13:30)，每 15 分鐘自動執行一次
    # UTC 1:00-5:00 = 台灣 9:00-13:00
    - cron: '*/15 1-5 * * 1-5'
  
  workflow_dispatch: # 保留手動測試按鈕

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 取得程式碼
        uses: actions/checkout@v3

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. 安裝必要套件 (含 FinMind 與 Telegram 支援)
        run: |
          pip install requests pandas FinMind tqdm

      - name: 4. 執行監控與發送
        run: python main.py
