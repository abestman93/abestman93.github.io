name: Stock Monitor
on:
  schedule:
    # 台股開盤期間 (9:00-13:30) 每 15 分鐘執行一次
    - cron: '*/15 1-5 * * 1-5' 
  workflow_dispatch: # 保留手動測試按鈕

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝所有必要套件
        run: pip install requests pandas FinMind tqdm

      - name: 執行監控程式
        run: python main.py
