name: Stock Monitor
on:
  schedule:
    # 這裡的 Cron 是 UTC 時間 (台股 9:00-13:30 = UTC 1:00-5:30)
    - cron: '*/15 1-5 * * 1-5' 
  workflow_dispatch: # 保留手動觸發按鈕

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests pandas FinMind
      - name: Run main.py
        run: python main.py
